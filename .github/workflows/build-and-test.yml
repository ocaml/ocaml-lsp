name: Build and Test

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    # Prime the caches every Monday
    - cron: 0 1 * * MON

jobs:
  build-and-test:
    name: Build and Test

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout tree
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.5"

      - name: Build and install dependencies
        run: opam install .

      # The Makefile explains why we don't use --with-test.
      - name: Install test dependencies
        run: opam exec -- make install-test-deps

      - name: Run build @all
        run: opam exec -- make all

      - name: Run the unit tests
        run: opam exec -- make test-ocaml

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: false # reenable when ppx_bisect is co-instable again
    steps:
      - name: Checkout tree
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.5"

      - name: Set git user
        run: |
          git config --global user.name github-actions[bot]
          git config --global user.email github-actions[bot]@users.noreply.github.com

      # Remove this pin once a compatible version of Merlin has been released
      - name: Pin dev Merlin
        run: opam --cli=2.1 pin --with-version=5.8-505 https://github.com/ocaml/merlin.git


      - name: Install dependencies
        run: |
          opam install . --deps-only
          opam exec -- make coverage-deps install-test-deps

      - run: opam exec -- make test-coverage
        env:
          COVERALLS_REPO_TOKEN: ${{ github.token }}
          PULL_REQUEST_NUMBER: ${{ github.event.number }}

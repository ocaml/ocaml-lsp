name: Nix

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v7
        with:
          submodules: true
      - name: nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - run: nix develop .#fmt --command make nix-fmt
